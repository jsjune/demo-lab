<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(content=~{::section})}">
<body>
<section>

    <div class="card" style="padding-bottom:1rem;">
        <div class="card-header">
            <h2>Real-time Monitoring</h2>
            <div class="refresh-bar">
                <span class="refresh-dot active"></span>
                <span id="metricStatus">Live Tracking</span>
            </div>
        </div>
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-value" id="currentTps">0.0</div>
                <div class="stat-label">TPS</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="avgLatency">0ms</div>
                <div class="stat-label">Avg Latency</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalErrors">0</div>
                <div class="stat-label">60m Errors</div>
            </div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1.5rem; margin-top:1.5rem;">
            <div class="chart-container" style="position: relative; height:200px; width:100%">
                <canvas id="tpsChart"></canvas>
            </div>
            <div class="chart-container" style="position: relative; height:200px; width:100%">
                <canvas id="latencyChart"></canvas>
            </div>
        </div>
        <div id="slowestTracesSection" style="margin-top:1.5rem; display:none;">
            <h4 style="margin-bottom:0.5rem; color:var(--secondary-color); font-size:0.85rem;">Top 5 Slowest Requests (Last 60m)</h4>
            <table style="font-size:0.8rem; background: #f8fafc; border-radius: 0.375rem; border:1px solid var(--border-color);">
                <thead>
                    <tr style="background:#f1f5f9">
                        <th>Server</th>
                        <th>Target</th>
                        <th>Duration</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="slowestTracesList">
                </tbody>
            </table>
        </div>
    </div>

    <!-- ── Search card ─────────────────────────────── -->
    <div class="card">
        <div class="card-header">
            <h2>Search Traces</h2>
            <div class="refresh-bar">
                <span class="refresh-dot" id="refreshDot"></span>
                <span id="refreshCountdown" style="min-width:2.5em; text-align:right;"></span>
                <button class="btn-ghost btn-sm" id="refreshToggle" onclick="toggleRefresh()">Auto Refresh: OFF</button>
            </div>
        </div>
        <form th:action="@{/}" method="get" class="search-form">
            <div class="form-group">
                <label>Transaction ID</label>
                <input type="text" name="txId" th:value="${txId}" placeholder="tx-...">
            </div>
            <div class="form-group">
                <label>Server Name</label>
                <input type="text" name="serverName" th:value="${serverName}" placeholder="server-...">
            </div>
            <button type="submit">Search</button>
            <a th:href="@{/}" class="btn btn-ghost" style="text-decoration:none;">Reset</a>
        </form>
    </div>

    <!-- ── Trace list card ─────────────────────────── -->
    <div class="card">
        <div class="card-header">
            <h2>Recent Traces</h2>
        </div>

        <!-- Filter bar -->
        <div class="filter-bar">
            <span class="filter-label">Status:</span>
            <button class="filter-chip active" id="chip-all-status" onclick="setStatusFilter('all')">All</button>
            <button class="filter-chip chip-ok"  id="chip-ok"         onclick="setStatusFilter('ok')">OK</button>
            <button class="filter-chip chip-err" id="chip-err"        onclick="setStatusFilter('err')">ERR</button>
            <div class="filter-sep"></div>
            <span class="filter-label">Category:</span>
            <button class="filter-chip active"    id="chip-all-cat"   onclick="setCatFilter('all')">All</button>
            <button class="filter-chip chip-http" id="chip-http"      onclick="setCatFilter('HTTP')">HTTP</button>
            <button class="filter-chip chip-db"   id="chip-db"        onclick="setCatFilter('DB')">DB</button>
            <button class="filter-chip chip-cache" id="chip-cache"    onclick="setCatFilter('CACHE')">CACHE</button>
            <button class="filter-chip chip-mq"   id="chip-mq"        onclick="setCatFilter('MQ')">MQ</button>
        </div>

        <div class="result-count" id="resultCount"></div>

        <table id="traceTable">
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>TX ID</th>
                    <th>Server</th>
                    <th>Category</th>
                    <th>Type</th>
                    <th>Target</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="trace : ${traces}"
                    th:classappend="${trace.success} ? '' : ' row-err'"
                    th:attr="data-status=${trace.success ? 'ok' : 'err'}, data-cat=${trace.category}, data-txid=${trace.txId}">
                    <td style="font-family:monospace; font-size:0.8rem;"
                        th:text="${#dates.format(new java.util.Date(trace.timestamp), 'MM-dd HH:mm:ss.SSS')}"></td>
                    <td>
                        <div class="tx-id-cell">
                            <span class="tx-id-short"
                                  th:text="${trace.txId}"
                                  th:title="${trace.txId}"></span>
                            <button class="btn-copy" th:attr="data-txid=${trace.txId}">copy</button>
                            <span th:if="${trace.extraInfo.eventCount > 1}" 
                                  class="group-badge" 
                                  th:text="'+' + (${trace.extraInfo.eventCount} - 1)"
                                  th:title="'Click Detail to see all ' + ${trace.extraInfo.eventCount} + ' events'"></span>
                        </div>
                    </td>
                    <td th:text="${trace.serverName}"></td>
                    <td>
                        <span class="cat-badge"
                              th:classappend="'cat-' + ${trace.category}"
                              th:text="${trace.category}"></span>
                    </td>
                    <td th:text="${trace.type}"></td>
                    <td class="target-cell" th:text="${trace.target}" th:title="${trace.target}"></td>
                    <td>
                        <span th:class="${trace.success} ? 'badge badge-success' : 'badge badge-error'"
                              th:text="${trace.success} ? 'OK' : 'ERR'"></span>
                    </td>
                    <td>
                        <a th:href="@{/trace/{id}(id=${trace.txId})}"
                           class="btn btn-ghost btn-sm"
                           style="text-decoration:none;">Detail</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(traces)}">
                    <td colspan="8" style="text-align:center; padding:2rem; color:var(--secondary-color);">
                        No traces found.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        // ── Filter logic ──────────────────────────────────────────────────────
        let statusFilter = 'all';
        let catFilter    = 'all';

        function applyFilters() {
            const rows = document.querySelectorAll('#traceTable tbody tr[data-status]');
            let visible = 0;
            rows.forEach(row => {
                const filterMatch = (statusFilter === 'all' || row.dataset.status === statusFilter)
                                 && (catFilter    === 'all' || row.dataset.cat    === catFilter);
                const groupHidden = row.dataset.groupHidden === 'true';
                row.style.display = (filterMatch && !groupHidden) ? '' : 'none';
                if (filterMatch && !groupHidden) visible++;
            });
            const total = rows.length;
            const el = document.getElementById('resultCount');
            el.textContent = visible === total
                ? `${total} trace${total !== 1 ? 's' : ''}`
                : `${visible} / ${total} traces (filtered)`;
        }

        function setStatusFilter(val) {
            statusFilter = val;
            ['chip-all-status', 'chip-ok', 'chip-err'].forEach(id =>
                document.getElementById(id).classList.remove('active'));
            const map = { all: 'chip-all-status', ok: 'chip-ok', err: 'chip-err' };
            document.getElementById(map[val]).classList.add('active');
            applyFilters();
        }

        function setCatFilter(val) {
            catFilter = val;
            ['chip-all-cat','chip-http','chip-db','chip-cache','chip-mq'].forEach(id =>
                document.getElementById(id).classList.remove('active'));
            const map = { all:'chip-all-cat', HTTP:'chip-http', DB:'chip-db',
                          CACHE:'chip-cache', MQ:'chip-mq' };
            const el = document.getElementById(map[val]);
            if (el) el.classList.add('active');
            applyFilters();
        }

        // ── Copy TX ID ────────────────────────────────────────────────────────
        document.addEventListener('click', function(e) {
            if (!e.target.classList.contains('btn-copy')) return;
            const txId = e.target.dataset.txid;
            if (!txId) return;
            navigator.clipboard.writeText(txId).then(() => {
                e.target.textContent = '✓';
                e.target.classList.add('copied');
                setTimeout(() => {
                    e.target.textContent = 'copy';
                    e.target.classList.remove('copied');
                }, 1500);
            }).catch(() => {});
        });

        // ── Auto-refresh ──────────────────────────────────────────────────────
        let refreshTimer  = null;
        let countdown     = 30;
        let refreshActive = false;

        function toggleRefresh() {
            refreshActive = !refreshActive;
            const btn = document.getElementById('refreshToggle');
            const dot = document.getElementById('refreshDot');
            if (refreshActive) {
                btn.textContent = 'Auto Refresh: ON';
                dot.classList.add('active');
                countdown = 30;
                tick();
            } else {
                btn.textContent = 'Auto Refresh: OFF';
                dot.classList.remove('active');
                document.getElementById('refreshCountdown').textContent = '';
                clearTimeout(refreshTimer);
            }
        }

        function tick() {
            document.getElementById('refreshCountdown').textContent = countdown + 's';
            if (countdown <= 0) { location.reload(); return; }
            countdown--;
            refreshTimer = setTimeout(tick, 1000);
        }

        // ── Init ──────────────────────────────────────────────────────────────
        let tpsChart = null;
        let latencyChart = null;

        function updateMetrics() {
            const serverName = document.querySelector('input[name="serverName"]').value;
            let url = '/api/metrics/summary?minutes=60';
            if (serverName) url += '&serverName=' + encodeURIComponent(serverName);

            fetch(url)
                .then(r => r.json())
                .then(data => {
                    renderCharts(data);
                    updateSummaryCards(data);
                    renderSlowestTraces(data.slowest);
                })
                .catch(err => console.error('Failed to update metrics', err));
        }

        function renderSlowestTraces(slowest) {
            const container = document.getElementById('slowestTracesSection');
            const list = document.getElementById('slowestTracesList');
            if (!slowest || slowest.length === 0) {
                container.style.display = 'none';
                return;
            }
            container.style.display = 'block';
            list.innerHTML = slowest.map(s => `
                <tr>
                    <td>${s.serverName}</td>
                    <td class="target-cell" title="${s.target}">${s.target}</td>
                    <td style="font-family:monospace; font-weight:700; color:var(--error-color)">${s.durationMs}ms</td>
                    <td><a href="/trace/${s.txId}" class="btn btn-ghost btn-sm" style="padding:0.1rem 0.5rem">Detail</a></td>
                </tr>
            `).join('');
        }

        function updateSummaryCards(data) {
            const currentTps = data.tps.length > 0 ? (data.tps[data.tps.length - 1].value / 60).toFixed(1) : "0.0";
            const avgLatency = data.latency.length > 0 ? (data.latency.reduce((a,b) => a + b.value, 0) / data.latency.length).toFixed(0) : "0";
            const totalErrors = data.errors.length > 0 ? data.errors.reduce((a,b) => a + b.value, 0).toFixed(0) : "0";

            document.getElementById('currentTps').textContent = currentTps;
            document.getElementById('avgLatency').textContent = avgLatency + "ms";
            document.getElementById('totalErrors').textContent = totalErrors;
        }

        function renderCharts(data) {
            const labels = data.tps.map(p => {
                const d = new Date(p.timestamp);
                return d.getHours() + ":" + String(d.getMinutes()).padStart(2, '0');
            });

            const tpsCtx = document.getElementById('tpsChart').getContext('2d');
            const latencyCtx = document.getElementById('latencyChart').getContext('2d');

            if (tpsChart) tpsChart.destroy();
            if (latencyChart) latencyChart.destroy();

            tpsChart = new Chart(tpsCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'TPS (Requests/min)',
                            data: data.tps.map(p => p.value),
                            borderColor: '#2563eb',
                            backgroundColor: 'rgba(37, 99, 235, 0.1)',
                            fill: true,
                            tension: 0.3,
                            pointRadius: 0
                        },
                        {
                            label: 'Errors',
                            data: data.errors.map(p => p.value),
                            borderColor: '#ef4444',
                            backgroundColor: 'rgba(239, 68, 68, 0.1)',
                            fill: true,
                            tension: 0.3,
                            pointRadius: 0
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false }, title: { display: true, text: 'TPS & Errors', font: { size: 12 } } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { size: 10 } } },
                        x: { grid: { display: false }, ticks: { font: { size: 10 }, maxRotation: 0 } }
                    }
                }
            });

            latencyChart = new Chart(latencyCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Latency (ms)',
                        data: data.latency.map(p => p.value),
                        borderColor: '#059669',
                        backgroundColor: 'rgba(5, 150, 105, 0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false }, title: { display: true, text: 'Avg Latency (ms)', font: { size: 12 } } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { size: 10 } } },
                        x: { grid: { display: false }, ticks: { font: { size: 10 }, maxRotation: 0 } }
                    }
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function () {
            updateMetrics();
            setInterval(updateMetrics, 30000); // Update every 30s
            applyFilters();
        });
    </script>
</section>
</body>
</html>

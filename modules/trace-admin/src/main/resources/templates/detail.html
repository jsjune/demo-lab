<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(content=~{::section})}">
<body>
<section>

    <style>
        /* Professional APM Timeline UI */
        .gantt-outer-container {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }
        .gantt-header-sticky {
            display: flex;
            background: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
            height: 44px;
            align-items: center;
            font-weight: 700;
            color: #475569;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .col-label-header {
            flex: 0 0 350px;
            padding: 0 1.5rem;
            border-right: 1px solid #e2e8f0;
            box-sizing: border-box;
        }
        .col-timeline-header {
            flex: 1;
            position: relative;
            height: 100%;
        }
        .ruler-tick {
            position: absolute;
            top: 14px;
            transform: translateX(-50%);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: #94a3b8;
        }
        .server-divider {
            padding: 0.75rem 1.5rem;
            background: #f1f5f9;
            border-bottom: 1px solid #e2e8f0;
            border-top: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            color: #1e293b;
            font-size: 0.8rem;
        }
        .server-divider:first-of-type { border-top: none; }
        .badge-svc {
            background: #3b82f6;
            color: #fff;
            padding: 2px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
        }
        .gantt-row {
            display: flex;
            height: 36px;
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.1s;
            box-sizing: border-box;
            align-items: stretch;
        }
        .gantt-row:hover { background: #f8fafc; }
        .gantt-row:last-child { border-bottom: none; }

        .cell-label {
            flex: 0 0 350px;
            padding: 0 1.5rem;
            border-right: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
            background: inherit;
            box-sizing: border-box;
            overflow: hidden;
        }
        /* Tree Lines */
        .tree-connector {
            position: absolute;
            left: var(--line-x);
            top: 0;
            bottom: 0;
            width: 1.5px;
            background: #e2e8f0;
        }
        .tree-connector-horizontal {
            position: absolute;
            left: var(--line-x);
            top: 50%;
            width: 10px;
            height: 1.5px;
            background: #e2e8f0;
        }

        .txt-op {
            font-size: 0.8rem;
            font-weight: 600;
            color: #334155;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .cell-timeline {
            flex: 1;
            position: relative;
            background-image: linear-gradient(to right, #f1f5f9 1px, transparent 1px);
            background-size: 20% 100%;
            box-sizing: border-box;
        }
        .bar-item {
            position: absolute;
            height: 18px;
            top: 50%;
            transform: translateY(-50%);
            border-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            cursor: pointer;
            z-index: 10;
            min-width: 3px;
            box-sizing: border-box;
            transition: opacity 0.2s;
        }
        .bar-item:hover { opacity: 0.85; }
        .marker-item {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 0 2px #fff, 0 2px 4px rgba(0,0,0,0.2);
            z-index: 11;
            cursor: pointer;
        }
        .lbl-dur {
            position: absolute;
            left: calc(100% + 10px);
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.7rem;
            font-weight: 800;
            color: #64748b;
            white-space: nowrap;
        }
        .dot-cat {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            z-index: 5;
        }
        .row-err-gantt { background: #fff1f2 !important; }
    </style>

    <!-- ── Header ──────────────────────────────────── -->
    <div class="card" style="padding-bottom:1rem;">
        <a th:href="@{/}" style="font-size:0.875rem; text-decoration:none; color:var(--primary-color);">← Back to List</a>
        <h2 style="margin-top:0.75rem;">Trace Details: <code th:text="${txId}"></code></h2>
    </div>

    <!-- ── Summary ─────────────────────────────────── -->
    <div class="card" th:if="${not #lists.isEmpty(events)}">
        <div class="stats-grid">
            <div class="stat-item"><div class="stat-value" th:text="${#lists.size(events)}">0</div><div class="stat-label">Total Logs</div></div>
            <div class="stat-item"><div class="stat-value" th:text="${events[events.size()-1].timestamp - events[0].timestamp} + 'ms'">-</div><div class="stat-label">Duration</div></div>
            <div class="stat-item"><div class="stat-value" id="statServers">-</div><div class="stat-label">Servers</div></div>
            <div class="stat-item"><div class="stat-value" id="statErr">0</div><div class="stat-label">Errors</div></div>
        </div>
    </div>

    <!-- ── Gantt ───────────────────────────────────── -->
    <div class="card">
        <div class="card-header">
            <h3>Timeline (Logical Hierarchy)</h3>
            <div class="refresh-bar"><span id="timelineMsg">Analyzing sequence...</span></div>
        </div>
        
        <div class="gantt-outer-container">
            <div class="gantt-header-sticky">
                <div class="col-label-header">Operation Hierarchy</div>
                <div class="col-timeline-header" id="ganttRuler"></div>
            </div>
            <div id="ganttBody"></div>
        </div>
    </div>

    <div id="spanTooltip" class="span-tooltip"></div>

    <!-- ── List ────────────────────────────────────── -->
    <div class="card">
        <h3>Raw Event List</h3>
        <table id="eventTable">
            <thead>
                <tr>
                    <th>Time (KST)</th>
                    <th>Server</th>
                    <th>Category</th>
                    <th>Type</th>
                    <th>Span ID</th>
                    <th>Target</th>
                    <th>Duration</th>
                    <th>Status</th>
                    <th style="width:36px;"></th>
                </tr>
            </thead>
            <tbody>
                <th:block th:each="event,stat : ${events}">
                    <tr th:classappend="${event.success} ? '' : ' row-err'" th:attr="data-success=${event.success}, data-server=${event.serverName}">
                        <td class="kst-time" style="font-family:monospace; font-size:0.75rem;" th:attr="data-ts=${event.timestamp}"></td>
                        <td th:text="${event.serverName}"></td>
                        <td><span class="cat-badge" th:classappend="'cat-' + ${event.category}" th:text="${event.category}"></span></td>
                        <td th:text="${event.type}"></td>
                        <td style="font-family:monospace; font-size:0.7rem; color:#64748b;" th:text="${event.spanId}" th:title="${event.spanId}"></td>
                        <td class="target-cell"><div th:text="${event.target}" th:title="${event.target}"></div></td>
                        <td style="font-family:monospace; font-size:0.82rem;" th:text="${event.durationMs != null ? event.durationMs + 'ms' : '-'}"></td>
                        <td><span th:class="${event.success} ? 'badge badge-success' : 'badge badge-error'" th:text="${event.success} ? 'OK' : 'ERR'"></span></td>
                        <td style="text-align:center;"><button th:if="${event.extraInfo != null and not event.extraInfo.isEmpty()}" class="btn-extra" th:attr="data-idx=${stat.index}">+</button></td>
                    </tr>
                    <tr th:if="${event.extraInfo != null and not event.extraInfo.isEmpty()}" class="extra-row" th:id="'extra-' + ${stat.index}" style="display:none;">
                        <td colspan="9" class="extra-info-cell">
                            <div class="extra-info-grid">
                                <div class="extra-info-item" th:each="entry : ${event.extraInfo.entrySet()}">
                                    <span class="extra-key" th:text="${entry.key}"></span>
                                    <span class="extra-val" th:text="${entry.value}"></span>
                                </div>
                            </div>
                        </td>
                    </tr>
                </th:block>
            </tbody>
        </table>
    </div>

    <script th:inline="javascript">window.rawEvents = /*[[${events}]]*/ [];</script>

    <script>
        function formatKST(ts) {
            const date = new Date(Number(ts));
            const h = String(date.getHours()).padStart(2, '0');
            const m = String(date.getMinutes()).padStart(2, '0');
            const s = String(date.getSeconds()).padStart(2, '0');
            const ms = String(date.getMilliseconds()).padStart(3, '0');
            return `${h}:${m}:${s}.${ms}`;
        }

        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('.kst-time').forEach(el => { el.textContent = formatKST(el.dataset.ts); });
            const raw = window.rawEvents || [];
            if (raw.length === 0) return;

            const events = raw.map(e => {
                const ts = Number(e.timestamp);
                const dur = e.durationMs ? Number(e.durationMs) : 0;
                const isEnd = e.type.endsWith('_END') || e.type === 'HTTP_OUT';
                const start = isEnd ? (ts - dur) : ts;
                return { ...e, start, end: ts, dur };
            });

            const minTime = Math.min(...events.map(e => e.start));
            const maxTime = Math.max(...events.map(e => e.end));
            const totalDuration = Math.max((maxTime - minTime) * 1.05, 1);

            document.getElementById('statServers').textContent = new Set(raw.map(e => e.serverName)).size;
            document.getElementById('statErr').textContent = raw.filter(e => !e.success).length;

            renderGantt(events, minTime, totalDuration);
        });

        function renderGantt(events, minTime, totalDuration) {
            const container = document.getElementById('ganttBody');
            const ruler = document.getElementById('ganttRuler');
            if (isNaN(totalDuration)) return;

            let rulerHtml = "";
            for (let i = 0; i <= 5; i++) {
                const left = (i / 5) * 100;
                rulerHtml += `<div class="ruler-tick" style="left:${left}%">${Math.round((totalDuration/5)*i)}ms</div>`;
            }
            ruler.innerHTML = rulerHtml;

            const spanMap = {};
            events.forEach(e => {
                if (e.spanId) {
                    if (!spanMap[e.spanId]) spanMap[e.spanId] = [];
                    spanMap[e.spanId].push(e);
                }
            });

            const childrenMap = {};
            const rootSpans = [];
            Object.keys(spanMap).forEach(spanId => {
                const parentId = spanMap[spanId][0].parentSpanId;
                if (!parentId || !spanMap[parentId]) rootSpans.push(spanId);
                else {
                    if (!childrenMap[parentId]) childrenMap[parentId] = [];
                    if (!childrenMap[parentId].includes(spanId)) childrenMap[parentId].push(spanId);
                }
            });

            const sortByTime = (a, b) => spanMap[a][0].timestamp - spanMap[b][0].timestamp;
            rootSpans.sort(sortByTime);
            Object.keys(childrenMap).forEach(pid => childrenMap[pid].sort(sortByTime));

            const orderedList = [];
            const visitedSpans = new Set();
            function traverse(spanId, depth) {
                if (visitedSpans.has(spanId)) return;
                visitedSpans.add(spanId);
                const evs = spanMap[spanId].sort((a, b) => a.timestamp - b.timestamp);
                const startEv = evs.find(e => e.type.endsWith('_START')) || evs[0];
                startEv.depth = depth; orderedList.push(startEv);
                evs.forEach(e => { if (e !== startEv && !e.type.endsWith('_END')) { e.depth = depth; orderedList.push(e); } });
                const children = childrenMap[spanId] || [];
                children.forEach(childId => traverse(childId, depth + 1));
                const endEv = evs.find(e => e.type.endsWith('_END'));
                if (endEv && endEv !== startEv) { endEv.depth = depth; orderedList.push(endEv); }
            }
            rootSpans.forEach(rootId => traverse(rootId, 0));

            const catColors = { 'HTTP': '#0ea5e9', 'DB': '#10b981', 'CACHE': '#f59e0b', 'MQ': '#8b5cf6', 'ASYNC': '#ec4899' };
            const errorColor = '#ef4444';

            let html = "";
            let lastServer = null;
            orderedList.forEach(e => {
                if (e.serverName !== lastServer) {
                    html += `<div class="server-divider" style="padding-left:${1.5 + (e.depth * 1.5)}rem;"><span class="badge-svc">${e.serverName}</span></div>`;
                    lastServer = e.serverName;
                }
                const left = ((e.start - minTime) / totalDuration) * 100;
                const width = e.dur > 0 ? Math.max((e.dur / totalDuration) * 100, 0.3) : 0;
                const color = e.success ? (catColors[e.category] || '#94a3b8') : errorColor;
                const timeStr = formatKST(e.timestamp);
                
                html += `
                <div class="gantt-row ${e.success ? '' : 'row-err-gantt'}">
                    <div class="cell-label" style="padding-left: ${1.5 + (e.depth * 1.5)}rem;">
                        ${e.depth > 0 ? `<div class="tree-connector" style="--line-x: ${1.5 + ((e.depth-1) * 1.5) + 0.25}rem;"></div>` : ''}
                        ${e.depth > 0 ? `<div class="tree-connector-horizontal" style="--line-x: ${1.5 + ((e.depth-1) * 1.5) + 0.25}rem;"></div>` : ''}
                        <div class="dot-cat" style="background-color:${color}"></div>
                        <div class="txt-op" title="${e.type}" style="color:${e.success ? '' : errorColor}">${e.type}</div>
                    </div>
                    <div class="cell-timeline">
                        ${e.dur > 0 ? `
                            <div class="bar-item" style="left:${left}%; width:${width}%; background-color:${color}"
                                 onmouseover="showTooltip(event, '${e.type}', '${e.target.replace(/'/g, "\\'")}', ${e.dur}, ${e.success}, '${timeStr}', '${e.spanId || ''}')"
                                 onmouseout="hideTooltip()">
                                 <span class="lbl-dur" style="color:${e.success ? '' : errorColor}">${e.dur}ms</span>
                            </div>
                        ` : `
                            <div class="marker-item" style="left:${left}%; background-color:${color}"
                                 onmouseover="showTooltip(event, '${e.type}', '${e.target.replace(/'/g, "\\'")}', 0, ${e.success}, '${timeStr}', '${e.spanId || ''}')"
                                 onmouseout="hideTooltip()">
                            </div>
                        `}
                    </div>
                </div>`;
            });
            container.innerHTML = html;
            document.getElementById('timelineMsg').textContent = `${events.length} events organized`;
        }

        const tooltip = document.getElementById('spanTooltip');
        function showTooltip(e, type, target, dur, success, timeStr, spanId) {
            tooltip.innerHTML = `<div style="font-size:0.65rem; color:#94a3b8; font-family:monospace;">${timeStr} (KST)</div><strong>${type}</strong><div style="font-size:0.7rem; color:#cbd5e1; margin-top:4px; max-width:300px; overflow-wrap:break-word;">${target}</div><div style="margin-top:4px; font-weight:800; color:${success?'#4ade80':'#ef4444'}">${success?'✅ OK':'❌ ERR'} | ${dur}ms</div><div style="font-size:0.6rem; color:#94a3b8; font-family:monospace; margin-top:4px;">span: ${spanId}</div>`;
            tooltip.style.display = 'block'; tooltip.style.left = (e.pageX + 15) + 'px'; tooltip.style.top = (e.pageY + 15) + 'px';
        }
        function hideTooltip() { tooltip.style.display = 'none'; }
        document.addEventListener('click', e => { if (!e.target.classList.contains('btn-extra')) return; const row = document.getElementById('extra-' + e.target.dataset.idx); const hidden = row.style.display === 'none'; row.style.display = hidden ? 'table-row' : 'none'; e.target.textContent = hidden ? '−' : '+'; });
    </script>
</section>
</body>
</html>

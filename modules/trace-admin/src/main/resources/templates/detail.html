<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(content=~{::section})}">
<body>
<section>

    <!-- ── Header card ─────────────────────────────── -->
    <div class="card" style="padding-bottom:1rem;">
        <a th:href="@{/}" style="font-size:0.875rem; text-decoration:none; color:var(--primary-color);">← Back to List</a>
        <h2 style="margin-top:0.75rem;">Transaction: <code th:text="${txId}"></code></h2>
    </div>

    <!-- ── Summary stats ────────────────────────────── -->
    <div class="card" th:if="${not #lists.isEmpty(events)}">
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-value" th:text="${#lists.size(events)}">0</div>
                <div class="stat-label">Total Spans</div>
            </div>
            <div class="stat-item">
                <div class="stat-value"
                     th:text="${events[events.size()-1].timestamp - events[0].timestamp} + 'ms'">-</div>
                <div class="stat-label">Duration</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statServers">-</div>
                <div class="stat-label">Servers</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statErr">0</div>
                <div class="stat-label">Errors</div>
            </div>
        </div>
    </div>

    <!-- ── Error Summary Card ──────────────────────── -->
    <div class="error-summary-card" id="errorSummary" style="display:none;">
        <div class="error-summary-header">
            <span style="font-size:1.2rem;">⚠️</span>
            <span>Error Summary</span>
        </div>
        <div id="errorList">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- ── Gantt chart ──────────────────────────────── -->
    <div class="card">
        <div class="card-header">
            <h3>Timeline (Logical Hierarchy)</h3>
            <div class="refresh-bar">
                <span class="refresh-dot"></span>
                <span id="timelineMsg">Processing events...</span>
            </div>
        </div>
        
        <div id="ganttContainer" class="gantt-chart">
            <div class="gantt-container">
                <div class="gantt-header" id="ganttRuler">
                    <!-- JS Populated Ruler -->
                </div>
                <div class="gantt-body" id="ganttBody">
                    <!-- JS Populated Rows -->
                </div>
            </div>
        </div>
        <p th:if="${#lists.isEmpty(events)}" style="color:var(--secondary-color);">
            No events found for this transaction.
        </p>
    </div>

    <!-- Tooltip element -->
    <div id="spanTooltip" class="span-tooltip"></div>

    <!-- ── Event list ────────────────────────────────── -->
    <div class="card">
        <h3>Event List</h3>
        <table id="eventTable">
            <thead>
                <tr>
                    <th>Offset</th>
                    <th>Server</th>
                    <th>Category</th>
                    <th>Type</th>
                    <th>Target</th>
                    <th>Duration</th>
                    <th>Status</th>
                    <th style="width:36px;"></th>
                </tr>
            </thead>
            <tbody>
                <th:block th:each="event,stat : ${events}">
                    <!-- Main event row -->
                    <tr th:classappend="${event.success} ? '' : ' row-err'"
                        th:attr="data-success=${event.success}, data-server=${event.serverName}">
                        <td style="font-family:monospace; font-size:0.82rem;"
                            th:text="${event.timestamp - events[0].timestamp} + 'ms'"></td>
                        <td th:text="${event.serverName}"></td>
                        <td>
                            <span class="cat-badge"
                                  th:classappend="'cat-' + ${event.category}"
                                  th:text="${event.category}"></span>
                        </td>
                        <td th:text="${event.type}"></td>
                        <td class="target-cell">
                            <div th:text="${event.target}" th:title="${event.target}"></div>
                            <span th:if="${not event.success and event.extraInfo.containsKey('errorMessage')}"
                                  class="inline-error"
                                  th:text="${event.extraInfo.get('errorMessage')}"></span>
                        </td>
                        <td style="font-family:monospace; font-size:0.82rem;"
                            th:text="${event.durationMs != null ? event.durationMs + 'ms' : '-'}"></td>
                        <td>
                            <span th:class="${event.success} ? 'badge badge-success' : 'badge badge-error'"
                                  th:text="${event.success} ? 'OK' : 'ERR'"></span>
                        </td>
                        <td style="text-align:center;">
                            <button th:if="${event.extraInfo != null and not event.extraInfo.isEmpty()}"
                                    class="btn-extra"
                                    th:attr="data-idx=${stat.index}">+</button>
                        </td>
                    </tr>
                    <!-- Expandable extra info row -->
                    <tr th:if="${event.extraInfo != null and not event.extraInfo.isEmpty()}"
                        class="extra-row"
                        th:id="'extra-' + ${stat.index}"
                        style="display:none;">
                        <td colspan="8" class="extra-info-cell">
                            <div class="extra-info-grid">
                                <div class="extra-info-item"
                                     th:each="entry : ${event.extraInfo.entrySet()}">
                                    <span class="extra-key" th:text="${entry.key}"></span>
                                    <span class="extra-val" th:text="${entry.value}"></span>
                                </div>
                            </div>
                        </td>
                    </tr>
                </th:block>
            </tbody>
        </table>
    </div>

    <script th:inline="javascript">
        // Data injected from server
        window.rawEvents = /*[[${events}]]*/ [];
        window.txId = /*[[${txId}]]*/ "";
    </script>

    <script>
        // ── Summary stats (computed from DOM) ─────────────────────────────────
        document.addEventListener('DOMContentLoaded', function () {
            const events = window.rawEvents || [];
            if (events.length === 0) return;

            renderGantt(events);

            const rows    = document.querySelectorAll('#eventTable tbody tr[data-server]');
            let errs      = 0;
            const servers = new Set();
            const errorItems = [];

            events.forEach(event => {
                if (!event.success) {
                    errorItems.push({
                        server: event.serverName,
                        type: event.type,
                        msg: (event.extraInfo && event.extraInfo.errorMessage) || 'Unknown error',
                        errorType: (event.extraInfo && event.extraInfo.errorType) || 'Error'
                    });
                }
            });

            rows.forEach(r => {
                if (r.dataset.success === 'false') errs++;
                if (r.dataset.server)  servers.add(r.dataset.server);
            });

            const elServers = document.getElementById('statServers');
            const elErr     = document.getElementById('statErr');
            if (elServers) elServers.textContent = servers.size;
            if (elErr) {
                elErr.textContent = errs;
                if (errs > 0) elErr.classList.add('err');
            }

            // Populate Error Summary Card
            if (errorItems.length > 0) {
                const summaryCard = document.getElementById('errorSummary');
                const errorList = document.getElementById('errorList');
                summaryCard.style.display = 'block';
                
                errorItems.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'error-item';
                    div.innerHTML = `
                        <div class="error-item-meta">[${item.server}] ${item.type} - ${item.errorType}</div>
                        <div class="error-item-msg">${item.msg}</div>
                    `;
                    errorList.appendChild(div);
                });
            }
        });

        // ── Gantt Rendering Logic ───────────────────────────────────────────
        function renderGantt(events) {
            const container = document.getElementById('ganttBody');
            const ruler = document.getElementById('ganttRuler');
            const msgEl = document.getElementById('timelineMsg');
            
            if (!container || events.length === 0) return;

            // 1. Convert flat events to Spans
            // Since we have durationMs in END events, we can reconstruct the span.
            // Some events (MQ_PRODUCE, CACHE_SET) are markers (point in time).
            const minTime = events[0].timestamp;
            const maxTime = events[events.length - 1].timestamp;
            const totalDuration = Math.max(maxTime - minTime, 1);

            const spans = [];
            events.forEach(e => {
                if (e.durationMs !== null) {
                    // It's an END event with duration
                    spans.push({
                        id: e.eventId,
                        server: e.serverName,
                        category: e.category,
                        type: e.type,
                        target: e.target,
                        start: e.timestamp - e.durationMs,
                        end: e.timestamp,
                        duration: e.durationMs,
                        success: e.success,
                        extra: e.extraInfo
                    });
                } else {
                    // Marker event (START or instant)
                    spans.push({
                        id: e.eventId,
                        server: e.serverName,
                        category: e.category,
                        type: e.type,
                        target: e.target,
                        start: e.timestamp,
                        end: e.timestamp,
                        duration: 0,
                        success: e.success,
                        extra: e.extraInfo
                    });
                }
            });

            // 2. Sort by start time and duration (desc)
            spans.sort((a, b) => (a.start - b.start) || (b.duration - a.duration));

            // 3. Calculate Depth & Error Propagation
            spans.forEach((span, i) => {
                let depth = 0;
                span.hasChildError = false;
                for (let j = i - 1; j >= 0; j--) {
                    const prev = spans[j];
                    if (span.start >= prev.start && span.end <= prev.end && prev.duration > 0) {
                        depth = prev.depth + 1;
                        span.parentId = prev.id;
                        break;
                    }
                }
                span.depth = depth;
            });

            // 3.1 Reverse pass for error propagation (if child failed, mark parents)
            for (let i = spans.length - 1; i >= 0; i--) {
                const s = spans[i];
                if (!s.success || s.hasChildError) {
                    let parent = spans.find(p => p.id === s.parentId);
                    if (parent) parent.hasChildError = true;
                }
            }

            // 4. Render Ruler
            const steps = 5;
            let rulerHtml = `<div class="gantt-ruler">`;
            for (let i = 0; i <= steps; i++) {
                const time = Math.round((totalDuration / steps) * i);
                rulerHtml += `<div class="gantt-ruler-label">${time}ms</div>`;
            }
            rulerHtml += `</div>`;
            ruler.innerHTML = rulerHtml;

            // 5. Render Spans
            const catColors = {
                'HTTP': '#2563eb',
                'DB': '#059669',
                'CACHE': '#d97706',
                'MQ': '#7c3aed',
                'IO': '#64748b'
            };

            const html = spans.map(s => {
                const left = ((s.start - minTime) / totalDuration) * 100;
                const width = Math.max((s.duration / totalDuration) * 100, 0.2);
                const color = catColors[s.category] || '#64748b';
                
                return `
                <div class="gantt-row depth-${s.depth}" style="--depth-offset: ${s.depth * 1.5}rem">
                    ${s.depth > 0 ? `<div class="connector-v" style="--depth-offset: ${s.depth * 1.5}rem"></div>` : ''}
                    <div class="gantt-label">
                        <div class="gantt-label-server" title="${s.server}">
                            ${s.hasChildError && s.success ? '<span style="color:var(--error-color); margin-right:4px;">⚠️</span>' : ''}
                            ${s.server}
                        </div>
                        <div class="gantt-label-type">
                            <span class="cat-badge cat-${s.category}" style="padding:0 4px; font-size:0.6rem;">${s.category}</span>
                            ${s.type.replace('_END', '').replace('_START', '')}
                        </div>
                    </div>
                    <div class="gantt-bar-container">
                        ${s.duration > 0 ? `
                            <div class="gantt-bar ${s.success ? '' : 'bar-err'}" 
                                 style="left: ${left}%; width: ${width}%; background-color: ${color}"
                                 onmouseover="showTooltip(event, ${JSON.stringify(s).replace(/"/g, '&quot;')})"
                                 onmouseout="hideTooltip()">
                            </div>
                        ` : `
                            <div class="gantt-marker" style="left: ${left}%"
                                 onmouseover="showTooltip(event, ${JSON.stringify(s).replace(/"/g, '&quot;')})"
                                 onmouseout="hideTooltip()">
                            </div>
                        `}
                    </div>
                </div>`;
            }).join('');

            container.innerHTML = html;
            msgEl.textContent = `${spans.length} spans processed`;
            document.querySelector('.refresh-dot').classList.add('active');
        }

        // ── Tooltip Helpers ───────────────────────────────────────────────
        const tooltip = document.getElementById('spanTooltip');
        function showTooltip(e, span) {
            let extraHtml = '';
            if (span.extra) {
                Object.entries(span.extra).forEach(([k, v]) => {
                    if (v) extraHtml += `<div style="font-size:0.65rem; color:#94a3b8; margin-top:2px;"><strong>${k}:</strong> ${v}</div>`;
                });
            }

            tooltip.innerHTML = `
                <strong style="color:#fff">${span.type}</strong>
                <div class="tooltip-target" style="color:#cbd5e1; margin-bottom:4px;">${span.target}</div>
                <div style="display:flex; align-items:center; gap:8px;">
                    <span class="badge ${span.success ? 'badge-success' : 'badge-error'}" style="padding:1px 4px;">
                        ${span.success ? 'OK' : 'ERR'}
                    </span>
                    <span style="font-family:monospace;">${span.duration}ms</span>
                </div>
                ${extraHtml}
            `;
            tooltip.style.display = 'block';
            updateTooltipPos(e);
        }

        function hideTooltip() {
            tooltip.style.display = 'none';
        }

        function updateTooltipPos(e) {
            tooltip.style.left = (e.pageX + 15) + 'px';
            tooltip.style.top = (e.pageY + 15) + 'px';
        }

        window.addEventListener('mousemove', (e) => {
            if (tooltip.style.display === 'block') {
                updateTooltipPos(e);
            }
        });

        // ── Expand / collapse extra info rows ─────────────────────────────────
        document.addEventListener('click', function (e) {
            if (!e.target.classList.contains('btn-extra')) return;
            const idx = e.target.dataset.idx;
            const row = document.getElementById('extra-' + idx);
            if (!row) return;
            const hidden = row.style.display === 'none' || row.style.display === '';
            row.style.display  = hidden ? 'table-row' : 'none';
            e.target.textContent = hidden ? '−' : '+';
        });
    </script>

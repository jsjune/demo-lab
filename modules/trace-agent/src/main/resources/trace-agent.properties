server-name=trace-agent-node
collector.host=localhost
collector.port=9200
header-key=X-Tx-Id
sampling.rate=1.0
sampling.strategy=rate
plugin.http.enabled=true
plugin.jdbc.enabled=true
plugin.mq.enabled=true
plugin.cache.enabled=true
plugin.file-io.enabled=false

# Logging
log.file.path=logs/trace-agent.log
log.level=DEBUG
log.file.limit=5242880
log.file.count=5

# -----------------------------------------------------------------------
# Spring Framework version (optional — agent auto-detects when omitted)
#
#  Value  | Profile         | Spring Boot | Servlet NS | doExecute arity
# --------+-----------------+-------------+------------+-----------------
#  5      | SPRING_5        | 2.x         | javax      | 4-param
#  6      | SPRING_6_0      | 3.0-3.1     | jakarta    | 4-param
#  6.0    | SPRING_6_0      | 3.0-3.1     | jakarta    | 4-param
#  6.1    | SPRING_6_1      | 3.2+        | jakarta    | 5-param (*)
#
#  (*) Spring 6.1 added an extra String parameter to RestTemplate.doExecute
#      and introduced RestClient (used as the auto-detection marker).
#
# Auto-detection strategy (when this property is absent):
#   1. jakarta.servlet.HttpServletRequest loadable  → Spring 6+
#   2. org.springframework.web.client.RestClient loadable → Spring 6.1+
#   3. Only javax visible                           → Spring 5
#
# Override class paths individually if your setup differs:
#   http.dispatcher.class=org/springframework/web/servlet/DispatcherServlet
#   http.resttemplate.class=org/springframework/web/client/RestTemplate
#   http.webclient.class.prefix=org/springframework/web/reactive/function/client/ExchangeFunctions
# -----------------------------------------------------------------------

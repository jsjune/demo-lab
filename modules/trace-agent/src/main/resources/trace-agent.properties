server-name=trace-agent-node
collector.host=localhost
collector.port=9200
header-key=X-Tx-Id
# Header name to force-enable tracing regardless of sampling.rate (default: X-Trace-Force)
# force-sample-header=X-Trace-Force
sampling.rate=1.0
sampling.strategy=rate
plugin.http.enabled=true
plugin.jdbc.enabled=true
plugin.mq.enabled=true
plugin.cache.enabled=true
plugin.file-io.enabled=false
# plugin.executor.enabled=true  (default: true — instruments ThreadPoolExecutor.execute(Runnable))

# -----------------------------------------------------------------------
# Optional: extend/override class scan prefixes per plugin (comma-separated)
# - plugin.<id>.target-prefixes      : full override
# - plugin.<id>.target-prefixes.add  : append defaults
#
# Examples:
# plugin.jdbc.target-prefixes.add=org/mariadb/jdbc/,com/ibm/db2/jcc/
# plugin.cache.target-prefixes.add=redis/clients/jedis/providers/
# plugin.http.target-prefixes.add=org/springframework/web/client/RestClient
# plugin.mq.target-prefixes.add=org/apache/kafka/streams/
# plugin.file-io.target-prefixes=java/io/,sun/nio/ch/
# -----------------------------------------------------------------------

# Buffer capacity for the in-memory event queue (default: 1000)
# Increase for high-throughput environments to reduce drop rate.
# Decrease to reduce memory footprint on resource-constrained hosts.
#buffer.capacity=1000

# -----------------------------------------------------------------------
# TCP Sender mode (default: single)
#
#  single: one event per TCP write (default, backward-compatible)
#  batch:  accumulate events and flush in bulk, reducing TCP syscall count
#
# sender.mode=single
#
# Batch mode settings (effective only when sender.mode=batch)
# sender.batch.size=50       # flush after collecting this many events (immediate)
# sender.batch.flush-ms=500  # flush after this many milliseconds (timeout)
# -----------------------------------------------------------------------

# Logging
log.file.path=logs/trace-agent.log
log.level=DEBUG
log.file.limit=5242880
log.file.count=5

# -----------------------------------------------------------------------
# Spring Framework version (optional — agent auto-detects when omitted)
#
#  Value  | Profile         | Spring Boot | Servlet NS | doExecute arity
# --------+-----------------+-------------+------------+-----------------
#  5      | SPRING_5        | 2.x         | javax      | 4-param
#  6      | SPRING_6_0      | 3.0-3.1     | jakarta    | 4-param
#  6.0    | SPRING_6_0      | 3.0-3.1     | jakarta    | 4-param
#  6.1    | SPRING_6_1      | 3.2+        | jakarta    | 5-param (*)
#
#  (*) Spring 6.1 added an extra String parameter to RestTemplate.doExecute
#      and introduced RestClient (used as the auto-detection marker).
#
# Auto-detection strategy (when this property is absent):
#   1. jakarta.servlet.HttpServletRequest loadable  → Spring 6+
#   2. org.springframework.web.client.RestClient loadable → Spring 6.1+
#   3. Only javax visible                           → Spring 5
#
# Override class paths individually if your setup differs:
#   http.dispatcher.class=org/springframework/web/servlet/DispatcherServlet
#   http.resttemplate.class=org/springframework/web/client/RestTemplate
#   http.webclient.class.prefix=org/springframework/web/reactive/function/client/ExchangeFunctions
# -----------------------------------------------------------------------
